<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinBet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginPage" class="center">

<div class="card">

<h1>⚽ CoinBet</h1>

<input
id="username"
type="text"
placeholder="Kullanıcı Adı">

<button onclick="register()">
Kayıt Ol
</button>

<button onclick="login()">
Giriş Yap
</button>

</div>

</div>

<div id="appPage" style="display:none;">

<header>

<h1>⚽ CoinBet</h1>

<div class="coins">
🪙 <span id="coinAmount">1000</span>
</div>

</header>

<div class="card">

<h2>
Hoşgeldin
<span id="playerName"></span>
</h2>

<button onclick="dailyBonus()">
🎁 Günlük Bonus
</button>

<button onclick="logout()">
🚪 Çıkış Yap
</button>

</div>

<div class="card">

<h2>Maçlar</h2>
<div id="matches"></div>

</div>

</div>

<div class="card">

<h2>Geçmiş</h2>

<div id="history"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
